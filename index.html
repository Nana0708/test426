<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="" />
    <title>サイトタイトル</title>
    <head>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Parisienne&display=swap" rel="stylesheet">
    </head>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header id="header">
      <div class="inner">
        <p class="logo"><a href="/">サイトタイトル</a></p>
        <nav id="gnav">
          <ul>
            <li><a href="#">メニュー1</a></li>
            <li><a href="#">メニュー2</a></li>
            <li><a href="#">メニュー3</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- /#header -->

    <main id="main">
      <!-- MV -->
      <section id="fv">
        <div class="fv__inner">
          <div class="fv__img"></div>

          <div class="fv__txt-wrap">
            <h2 class="fv__txt">自分を知っている人は 美しい。</h2>
          </div>
        </div>
      </section>
      <!-- /#mv -->

      <!-- セクション例 -->
      <section id="news" class="news">
        <div class="news__container">
          <div class="c-section-title">
            <p class="c-section-title__bg" aria-hidden="true">News</p>
            <h2 class="c-section-title__main">News</h2>
            <p class="c-section-title__sub">お知らせ</p>
          </div>
          <p>テキストが入ります。</p>
        </div>
      </section>
      <!-- /#about -->
    </main>
    <!-- /#main -->

    <footer id="footer">
      <div class="inner">
        <p class="copy"><small>&copy; 2025 サイトタイトル</small></p>
      </div>
    </footer>
    <!-- /#footer -->

    <a href="#" class="pagetop">↑</a>

    <script src="js/script.js"></script>
  </body>
</html>
